{% extends 'layouts/base.html' %}

{% block title %}Novo Cálculo - Sistema de Controle de Ponto{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Novo Cálculo</h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        <div class="btn-group me-2">
            <a href="{{ url_for('calculation.list_calculations') }}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <form action="{{ url_for('calculation.create_calculation') }}" method="post">
                    <div class="mb-3">
                        <label for="employee_id" class="form-label">Funcionário</label>
                        <select class="form-select" id="employee_id" name="employee_id" required>
                            <option value="">Selecione um funcionário</option>
                            {% for employee in employees %}
                                <option value="{{ employee.id }}">{{ employee.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="period_start" class="form-label">Data Inicial</label>
                        <input type="date" class="form-control" id="period_start" name="period_start" value="{{ start_date }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="period_end" class="form-label">Data Final</label>
                        <input type="date" class="form-control" id="period_end" name="period_end" value="{{ end_date }}" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Calcular</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
